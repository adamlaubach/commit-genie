<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Demo | TechFest</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Outfit',sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
    .header-img,.footer-img{width:100%;display:block;flex-shrink:0}
    .gwrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .card{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:32px 24px;max-width:370px;width:100%;box-shadow:0 2px 8px rgba(0,0,0,0.03)}
    .title{font-size:2rem;font-weight:700;margin-bottom:8px;text-align:center}
    .desc{color:#7a9bb5;font-size:1rem;text-align:center;margin-bottom:18px}
    .board{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(3,60px);gap:8px;justify-content:center;margin:18px 0}
    .cell{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:8px;font-size:2.1rem;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .1s;min-width:60px;min-height:60px}
    .cell:hover{background:#e8f4f8}
    .status{font-size:1.1rem;font-weight:500;text-align:center;margin-bottom:12px;min-height:28px}
    .btn{background:linear-gradient(135deg,#62d84e,#00c7b1);color:#061525;font-weight:700;border:none;border-radius:10px;padding:12px 24px;cursor:pointer;display:block;margin:0 auto;font-size:1rem;transition:transform .1s}
    .btn:active{transform:scale(0.97)}
    @media(max-width:500px){.card{padding:18px 4px}.board{gap:5px}.cell{font-size:1.5rem;min-width:38px;min-height:38px}}
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="header-img" alt="Header" style="min-height:100px;background:#061525;" />
  <div class="gwrap">
    <div class="card">
      <div class="title">Tic Tac Toe</div>
      <div class="desc">Two players take turns. First to get 3 in a row wins!</div>
      <div class="status" id="status">Player X's turn</div>
      <div class="board" id="board">
        <div class="cell" data-i="0"></div>
        <div class="cell" data-i="1"></div>
        <div class="cell" data-i="2"></div>
        <div class="cell" data-i="3"></div>
        <div class="cell" data-i="4"></div>
        <div class="cell" data-i="5"></div>
        <div class="cell" data-i="6"></div>
        <div class="cell" data-i="7"></div>
        <div class="cell" data-i="8"></div>
      </div>
      <button class="btn" id="reset">Reset Game</button>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="footer-img" alt="Footer" style="min-height:28px;background:#0a1f33;" />
  <script>
    let board=["","","","","","","","",""];let current="X",playing=true;const winComb=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];const cells=[...document.querySelectorAll('.cell')],status=document.getElementById('status'),reset=document.getElementById('reset');function checkWin(){for(let c of winComb){const[a,b,d]=c;if(board[a]&&board[a]===board[b]&&board[a]===board[d])return board[a];}return null}function checkDraw(){return board.every(x=>x)}function updateStatus(msg){status.textContent=msg}function handleClick(e){const i=+e.target.dataset.i;if(!playing||board[i])return;board[i]=current;e.target.textContent=current;const winner=checkWin();if(winner){updateStatus(`Player ${winner} wins! 🎉`);playing=false;return;}if(checkDraw()){updateStatus("It's a draw!");playing=false;return;}current=current=="X"?"O":"X";updateStatus(`Player ${current}'s turn`)}cells.forEach(c=>c.addEventListener('click',handleClick));reset.onclick=()=>{board=["","","","","","","","",""];cells.forEach(c=>c.textContent="");current="X";playing=true;updateStatus("Player X's turn")}
  </script>
</body>
</html>
