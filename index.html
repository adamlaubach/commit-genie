<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Demo | TechFest</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Outfit',sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
    .header-img{width:100%;display:block;min-height:140px;background:#061525;}
    .footer-img{width:100%;display:block;min-height:28px;background:#0a1f33;}
    .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .card{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.08);border-radius:12px;max-width:400px;width:100%;padding:32px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.03);}
    .q{font-size:1.1rem;font-weight:600;margin-bottom:16px;}
    .opts{display:flex;flex-direction:column;gap:12px;margin-bottom:18px;}
    .opt{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:8px;padding:10px 16px;cursor:pointer;transition:background .15s;}
    .opt:hover{background:#e0e0e0;}
    .opt.sel{background:#62d84e;color:#fff;border-color:#62d84e;}
    .fb{font-size:.98rem;margin-bottom:12px;min-height:22px;}
    .btn{background:linear-gradient(135deg,#62d84e,#00c7b1);color:#061525;font-weight:700;border:none;border-radius:10px;padding:12px 24px;cursor:pointer;margin-top:8px;}
    .btn:active{transform:translateY(1px);}
    .score{font-size:1.05rem;font-weight:500;margin-bottom:10px;}
    @media(max-width:500px){.card{padding:18px 6px;}}
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="header-img" alt="Header" />
  <div class="wrap">
    <div class="card" id="quiz">
      <div class="score" id="score"></div>
      <div class="q" id="q"></div>
      <div class="opts" id="opts"></div>
      <div class="fb" id="fb"></div>
      <button class="btn" id="next" style="display:none">Next</button>
      <button class="btn" id="restart" style="display:none">Restart Quiz</button>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="footer-img" alt="Footer" />
  <script>
const quiz=[
  {q:"Which ServiceNow release introduced Flow Designer?",a:["London","Madrid","Orlando","Kingston"],c:1},
  {q:"What is the codename for the ServiceNow Paris release?",a:["Pike","Paris","Pine","Palo Alto"],c:0},
  {q:"Which release added the Now Mobile app?",a:["New York","Orlando","Paris","Quebec"],c:0},
  {q:"Which release first featured Virtual Agent?",a:["Kingston","London","Madrid","Orlando"],c:1},
  {q:"What is the codename for the ServiceNow Quebec release?",a:["Quebec","Quebec City","Quito","Quasar"],c:0}
];
let idx=0,score=0,answered=false;
const qEl=document.getElementById('q'),optsEl=document.getElementById('opts'),fbEl=document.getElementById('fb'),nextBtn=document.getElementById('next'),restartBtn=document.getElementById('restart'),scoreEl=document.getElementById('score');
function showQ(){
  answered=false;fbEl.textContent='';nextBtn.style.display='none';
  const cur=quiz[idx];qEl.textContent=cur.q;
  optsEl.innerHTML='';
  cur.a.forEach((t,i)=>{
    const d=document.createElement('div');d.className='opt';d.textContent=t;
    d.onclick=()=>sel(i,d);
    optsEl.appendChild(d);
  });
  scoreEl.textContent=`Question ${idx+1} of 5 | Score: ${score}`;
}
function sel(i,el){
  if(answered)return;answered=true;
  const cur=quiz[idx];
  [...optsEl.children].forEach((c,j)=>{c.classList.remove('sel');if(j===i)c.classList.add('sel');});
  if(i===cur.c){fbEl.textContent='Correct!';score++;}else{fbEl.textContent=`Incorrect. Correct: ${cur.a[cur.c]}`;}
  nextBtn.style.display='inline-block';
  if(idx===quiz.length-1)nextBtn.textContent='Finish';else nextBtn.textContent='Next';
}
nextBtn.onclick=()=>{
  if(idx<quiz.length-1){idx++;showQ();}else{showRes();}
};
function showRes(){
  qEl.textContent='Quiz Complete!';optsEl.innerHTML='';
  fbEl.textContent=`Final Score: ${score} / 5`;
  nextBtn.style.display='none';restartBtn.style.display='inline-block';scoreEl.textContent='';
}
restartBtn.onclick=()=>{idx=0;score=0;restartBtn.style.display='none';showQ();};
showQ();
  </script>
</body>
</html>
