<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Demo | TechFest</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Outfit',sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
    .header-img{width:100%;display:block;min-height:100px;background:#061525;}
    .game-wrap{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.08);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04);padding:32px 24px;max-width:340px;width:100%;display:flex;flex-direction:column;align-items:center;}
    .ttt-board{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(3,60px);gap:8px;margin:16px 0;}
    .ttt-cell{width:60px;height:60px;font-size:2.2rem;display:flex;align-items:center;justify-content:center;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:8px;cursor:pointer;transition:background 0.1s;}
    .ttt-cell:hover{background:#e0e0e0;}
    .ttt-status{font-size:1.1rem;margin-bottom:8px;min-height:24px;}
    .ttt-btn{background:linear-gradient(135deg,#62d84e,#00c7b1);color:#061525;font-weight:700;border:none;border-radius:10px;padding:10px 22px;cursor:pointer;margin-top:10px;font-size:1rem;}
    @media(max-width:500px){.game-wrap{padding:16px 4px;}.ttt-board{gap:4px;}.ttt-cell{width:40px;height:40px;font-size:1.3rem;}}
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="header-img" alt="Header" />
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
    <div class="game-wrap">
      <div class="ttt-status" id="ttt-status">Player X's turn</div>
      <div class="ttt-board" id="ttt-board"></div>
      <button class="ttt-btn" id="ttt-restart" style="display:none;">Restart</button>
    </div>
  </div>
  <script>
    let board=["","","","","","","","",""];
    let current="X",gameOver=false;
    const status=document.getElementById("ttt-status"),
    boardDiv=document.getElementById("ttt-board"),
    restartBtn=document.getElementById("ttt-restart");
    function render(){
      boardDiv.innerHTML="";
      board.forEach((v,i)=>{
        const c=document.createElement("div");
        c.className="ttt-cell";
        c.textContent=v;
        c.onclick=()=>move(i);
        boardDiv.appendChild(c);
      });
    }
    function move(i){
      if(gameOver||board[i])return;
      board[i]=current;
      render();
      if(checkWin(current)){
        status.textContent="Player "+current+" wins!";
        gameOver=true;
        restartBtn.style.display="block";
      }else if(board.every(x=>x)){status.textContent="It's a draw!";gameOver=true;restartBtn.style.display="block";}
      else{current=current=="X"?"O":"X";status.textContent="Player "+current+"'s turn";}
    }
    function checkWin(p){
      const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      return w.some(a=>a.every(i=>board[i]==p));
    }
    restartBtn.onclick=()=>{board=["","","","","","","","",""];current="X";gameOver=false;status.textContent="Player X's turn";restartBtn.style.display="none";render();};
    render();
  </script>
</body>
</html>
