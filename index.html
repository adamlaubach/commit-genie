<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Demo | TechFest</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Outfit',sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
    .header-img{width:100%;display:block;min-height:140px;background:#061525}
    .footer-img{width:100%;display:block;min-height:28px;background:#0a1f33}
    .game-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .snake-card{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:32px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.04);min-width:320px;max-width:360px}
    .score{font-size:1.2rem;font-weight:600;margin-bottom:12px;color:#00c7b1;text-align:center}
    .snake-canvas{background:#f5f5f5;border:2px solid #62d84e;border-radius:8px;display:block;margin:0 auto}
    .btn{margin:18px auto 0 auto;display:block;background:linear-gradient(135deg,#62d84e,#00c7b1);color:#061525;font-weight:700;border:none;border-radius:10px;padding:12px 24px;cursor:pointer;transition:transform .1s}
    .btn:active{transform:scale(0.97)}
    .game-over{color:#d01547;font-weight:700;text-align:center;margin-top:16px}
    @media(max-width:500px){.snake-card{padding:16px 4px;min-width:0;max-width:98vw}}
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.jpg" class="header-img" alt="Header" />
  <div class="game-wrap">
    <div class="snake-card">
      <div class="score" id="score">Score: 0</div>
      <canvas id="snake" width="240" height="240" class="snake-canvas" tabindex="0"></canvas>
      <button class="btn" id="restart" style="display:none">Restart</button>
      <div class="game-over" id="gameover" style="display:none">Game Over!</div>
    </div>
  </div>
  <img src="" class="footer-img" alt="Footer" />
  <script>
    const canvas=document.getElementById('snake'),ctx=canvas.getContext('2d'),box=24,rows=10,cols=10;
    let snake,dir,food,score,dead,moveInt;
    function reset(){
      snake=[{x:4,y:5}],dir='RIGHT',food=randFood(),score=0,dead=false;
      document.getElementById('score').textContent='Score: '+score;
      document.getElementById('gameover').style.display='none';
      document.getElementById('restart').style.display='none';
      clearInterval(moveInt);moveInt=setInterval(move,120);draw();
    }
    function randFood(){
      let f;do{f={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}}
      while(snake.some(s=>s.x===f.x&&s.y===f.y));return f;
    }
    function move(){
      let head={...snake[0]};
      if(dir==='LEFT')head.x--;else if(dir==='RIGHT')head.x++;else if(dir==='UP')head.y--;else if(dir==='DOWN')head.y++;
      if(head.x<0||head.x>=cols||head.y<0||head.y>=rows||snake.some(s=>s.x===head.x&&s.y===head.y)){
        dead=true;clearInterval(moveInt);
        document.getElementById('gameover').style.display='block';
        document.getElementById('restart').style.display='block';return;
      }
      snake.unshift(head);
      if(head.x===food.x&&head.y===food.y){score++;document.getElementById('score').textContent='Score: '+score;food=randFood();}
      else snake.pop();
      draw();
    }
    function draw(){
      ctx.clearRect(0,0,box*cols,box*rows);
      ctx.fillStyle='#62d84e';snake.forEach((s,i)=>{ctx.fillRect(s.x*box,s.y*box,box,box)});
      ctx.fillStyle='#d01547';ctx.fillRect(food.x*box,food.y*box,box,box);
    }
    document.addEventListener('keydown',e=>{
      if(dead)return;
      if(e.key==='ArrowLeft'&&dir!=='RIGHT')dir='LEFT';
      else if(e.key==='ArrowUp'&&dir!=='DOWN')dir='UP';
      else if(e.key==='ArrowRight'&&dir!=='LEFT')dir='RIGHT';
      else if(e.key==='ArrowDown'&&dir!=='UP')dir='DOWN';
    });
    document.getElementById('restart').onclick=reset;
    canvas.addEventListener('click',()=>canvas.focus());
    reset();
  </script>
</body>
</html>
