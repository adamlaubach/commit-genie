<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Demo | TechFest</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Outfit',sans-serif;background:#ffffff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;}
    .header-img{width:100%;display:block;min-height:100px;background:#061525;}
    .w{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .c{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.08);border-radius:12px;max-width:420px;width:100%;padding:28px 20px 20px 20px;box-sizing:border-box;}
    .t{font-size:1.5rem;font-weight:700;margin-bottom:12px;text-align:center;}
    .q{margin-bottom:18px;}
    .qtxt{font-weight:500;margin-bottom:10px;}
    .opts{display:flex;flex-direction:column;gap:8px;}
    .opt{background:rgba(255,255,255,1);border:1px solid rgba(0,0,0,0.15);border-radius:8px;padding:10px 14px;cursor:pointer;transition:background 0.1s;}
    .opt.sel{border-color:#d11547;background:#f0f0f0;}
    .opt.corr{border-color:#62d84e;background:#eafbe6;}
    .opt.wrong{border-color:#d11547;background:#ffeaea;}
    .btn{background:linear-gradient(135deg,#62d84e,#00c7b1);color:#1a1a1a;font-weight:700;border:none;border-radius:10px;padding:12px 24px;cursor:pointer;margin-top:18px;width:100%;font-size:1rem;}
    .btn:active{transform:translateY(1px);}
    .score{font-size:1.2rem;font-weight:600;text-align:center;margin:18px 0 8px 0;}
    .desc{color:#7a9bb5;font-size:0.98rem;text-align:center;margin-bottom:18px;}
    @media(max-width:500px){.c{padding:16px 4vw;max-width:98vw;}}
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="header-img" alt="Header" />
  <div class="w">
    <div class="c" id="quiz">
      <div class="t">ServiceNow Versions Quiz</div>
      <div class="desc">Test your knowledge of ServiceNow releases and features (as of June 2026).</div>
      <div id="qarea"></div>
      <button class="btn" id="nextBtn" style="display:none;">Next</button>
      <div id="scoreArea" style="display:none;"></div>
      <button class="btn" id="restartBtn" style="display:none;">Restart Quiz</button>
    </div>
  </div>
  <script>
    const qs=[
      {q:"What is the codename for the ServiceNow release in Q1 2026?",a:["Zurich","Washington","Vancouver","Tokyo"],c:1},
      {q:"Which release introduced the 'AI Search' feature?",a:["Orlando","Paris","Rome","San Diego"],c:2},
      {q:"What is the main focus of the ServiceNow Vancouver release?",a:["Employee Experience","AI & Automation","Security Operations","ITOM"],c:1},
      {q:"Which version came immediately before Washington?",a:["Vancouver","Tokyo","Utah","San Diego"],c:0},
      {q:"What is the ServiceNow release cycle frequency?",a:["Annually","Every 6 months","Every 2 years","Quarterly"],c:1}
    ];
    let qi=0,score=0,answered=false;
    const qarea=document.getElementById('qarea'),nextBtn=document.getElementById('nextBtn'),scoreArea=document.getElementById('scoreArea'),restartBtn=document.getElementById('restartBtn');
    function showQ(){
      answered=false;
      nextBtn.style.display="none";
      scoreArea.style.display="none";
      restartBtn.style.display="none";
      const q=qs[qi];
      let h=`<div class=\"q\"><div class=\"qtxt\">${qi+1}. ${q.q}</div><div class=\"opts\">`;
      q.a.forEach((o,i)=>{h+=`<div class=\"opt\" data-i=\"${i}\">${o}</div>`});
      h+="</div></div>";
      qarea.innerHTML=h;
      document.querySelectorAll('.opt').forEach(el=>el.onclick=onOpt);
    }
    function onOpt(e){
      if(answered)return;
      answered=true;
      const idx=+e.currentTarget.dataset.i;
      document.querySelectorAll('.opt').forEach((el,i)=>{
        el.classList.add(i===qs[qi].c?"corr":(i===idx?"wrong":""));
        if(i===idx)el.classList.add("sel");
      });
      if(idx===qs[qi].c)score++;
      nextBtn.style.display="block";
      if(qi===qs.length-1)nextBtn.textContent="Show Score";
      else nextBtn.textContent="Next";
    }
    nextBtn.onclick=()=>{
      if(qi<qs.length-1){qi++;showQ();}
      else showScore();
    };
    function showScore(){
      qarea.innerHTML="";
      scoreArea.style.display="block";
      scoreArea.innerHTML=`<div class=\"score\">You scored ${score} out of ${qs.length}!</div>`;
      restartBtn.style.display="block";
    }
    restartBtn.onclick=()=>{
      qi=0;score=0;showQ();
    };
    showQ();
  </script>
</body>
</html>
