<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Demo | TechFest</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Outfit',sans-serif;background:#ffffff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
    .header-img{width:100%;display:block;min-height:100px;background:#061525;}
    .content{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .card{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:32px 28px;box-shadow:0 0 20px rgba(208,21,71,0.08);max-width:400px;width:100%;text-align:center;}
    .cta-btn{background:linear-gradient(135deg,#62d84e,#00c7b1);color:#ffffff;font-weight:700;border:none;border-radius:10px;padding:12px 24px;font-size:1.1rem;cursor:pointer;transition:transform 0.1s;}
    .cta-btn:active{transform:translateY(2px);}
    @media(max-width:500px){.card{padding:18px 8px;}}
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="header-img" alt="Header" />
  <div class="content">
    <div class="card">
      <h1 style="margin-bottom:18px;font-size:2rem;">Welcome to Your AI Agent Demo!</h1>
      <p style="margin-bottom:24px;color:#7a9bb5;">This page is ready to publish to GitHub. Click below to proceed.</p>
      <button id="publishBtn" class="cta-btn">Publish to GitHub</button>
    </div>
  </div>
  <script>
    document.getElementById('publishBtn').addEventListener('click',function(){alert('Ready to publish! Please confirm below to push this page to GitHub.')});
  </script>
</body>
</html>
