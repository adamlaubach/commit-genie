<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Demo | TechFest</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Outfit',sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
    .header-img{width:100%;display:block;min-height:100px;background:#061525}
    .footer-img{width:100%;display:block;min-height:28px;background:#0a1f33}
    .wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .card{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:32px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.04);max-width:340px;width:100%;display:flex;flex-direction:column;align-items:center}
    .status{font-size:1.1rem;font-weight:600;margin-bottom:18px;color:#00a37a;text-align:center;min-height:28px}
    .board{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(3,60px);gap:8px;margin-bottom:20px}
    .cell{width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:2.1rem;font-weight:700;background:#f5f5f5;border-radius:8px;cursor:pointer;transition:background 0.15s}
    .cell:hover{background:#e0f7e9}
    .cell.filled{cursor:default;color:#7a9bb5}
    .restart-btn{margin-top:8px;background:linear-gradient(135deg,#62d84e,#00c7b1);color:#061525;font-weight:700;border:none;border-radius:10px;padding:12px 24px;font-size:1rem;cursor:pointer;transition:transform 0.1s}
    .restart-btn:active{transform:scale(0.97)}
    @media(max-width:500px){.card{padding:18px 4px}.board{grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);gap:5px}.cell{width:44px;height:44px;font-size:1.3rem}}
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="header-img" alt="Header" />
  <div class="wrapper">
    <div class="card">
      <div class="status" id="status">Player X's turn</div>
      <div class="board" id="board">
        <div class="cell" data-idx="0"></div>
        <div class="cell" data-idx="1"></div>
        <div class="cell" data-idx="2"></div>
        <div class="cell" data-idx="3"></div>
        <div class="cell" data-idx="4"></div>
        <div class="cell" data-idx="5"></div>
        <div class="cell" data-idx="6"></div>
        <div class="cell" data-idx="7"></div>
        <div class="cell" data-idx="8"></div>
      </div>
      <button class="restart-btn" id="restart">Restart</button>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="footer-img" alt="Footer" />
  <script>
    const boardEl=document.getElementById('board'),statusEl=document.getElementById('status'),restartBtn=document.getElementById('restart');
    let board=Array(9).fill(''),xTurn=true,gameOver=false;
    const winCombos=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    function updateStatus(msg){statusEl.textContent=msg}
    function checkWinner(){
      for(const c of winCombos){
        const[a,b,c2]=c;
        if(board[a]&&board[a]===board[b]&&board[a]===board[c2])return board[a];
      }
      return board.every(v=>v)?'draw':null;
    }
    function handleCellClick(e){
      if(gameOver)return;
      const idx=+e.target.dataset.idx;
      if(board[idx])return;
      board[idx]=xTurn?'X':'O';
      e.target.textContent=board[idx];
      e.target.classList.add('filled');
      const winner=checkWinner();
      if(winner==='X'||winner==='O'){
        updateStatus(`Player ${winner} wins! 🎉`);gameOver=true;
      }else if(winner==='draw'){
        updateStatus("It's a draw!");gameOver=true;
      }else{
        xTurn=!xTurn;
        updateStatus(`Player ${xTurn?'X':'O'}'s turn`);
      }
    }
    function restart(){
      board=Array(9).fill('');xTurn=true;gameOver=false;
      document.querySelectorAll('.cell').forEach(c=>{c.textContent='';c.classList.remove('filled')});
      updateStatus("Player X's turn");
    }
    boardEl.addEventListener('click',e=>{
      if(e.target.classList.contains('cell'))handleCellClick(e)
    });
    restartBtn.addEventListener('click',restart);
  </script>
</body>
</html>
