<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Demo | TechFest</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Outfit',sans-serif;background:#ffffff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
    .header-img,.footer-img{width:100%;display:block;flex-shrink:0;}
    .wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .game{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:32px 24px;box-shadow:0 0 20px rgba(208,21,71,0.15);max-width:400px;width:100%;}
    .status{font-size:1.2em;margin-bottom:18px;color:#1a1a1a;text-align:center;}
    .board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
    .cell{background:rgba(255,255,255,1);border:1px solid rgba(0,0,0,0.15);color:#1a1a1a;font-size:2em;font-weight:700;border-radius:8px;width:80px;height:80px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.2s;}
    .cell.winner{background:#62d84e;color:#061525;}
    .reset-btn{background:linear-gradient(135deg,#62d84e,#00c7b1);color:#061525;font-weight:700;border:none;border-radius:10px;padding:12px 24px;cursor:pointer;font-size:1em;margin-top:8px;transition:transform 0.1s;}
    .reset-btn:hover{transform:translateY(-2px);}
    @media(max-width:500px){.game{padding:16px 4px;}.cell{width:60px;height:60px;font-size:1.3em;}}
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="header-img" alt="Header" style="min-height:100px;background:#061525;" />
  <div class="wrapper">
    <div class="game">
      <div class="status" id="status">Player X's turn</div>
      <div class="board" id="board">
        <div class="cell" id="c0"></div>
        <div class="cell" id="c1"></div>
        <div class="cell" id="c2"></div>
        <div class="cell" id="c3"></div>
        <div class="cell" id="c4"></div>
        <div class="cell" id="c5"></div>
        <div class="cell" id="c6"></div>
        <div class="cell" id="c7"></div>
        <div class="cell" id="c8"></div>
      </div>
      <button class="reset-btn" id="reset">Reset Game</button>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="footer-img" alt="Footer" style="min-height:28px;background:#0a1f33;" />
  <script>
    let board = Array(9).fill('');
    let current = 'X';
    let gameOver = false;
    const status = document.getElementById('status');
    const cells = Array.from({length:9},(_,i)=>document.getElementById('c'+i));
    const winCombos = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];
    function checkWinner(){
      for(let combo of winCombos){
        const [a,b,c]=combo;
        if(board[a]&&board[a]===board[b]&&board[a]===board[c]){
          cells[a].classList.add('winner');
          cells[b].classList.add('winner');
          cells[c].classList.add('winner');
          status.textContent='Player '+board[a]+' wins!';
          gameOver=true;
          return;
        }
      }
      if(board.every(cell=>cell)){
        status.textContent='Draw!';
        gameOver=true;
      }
    }
    function handleClick(i){
      if(board[i]||gameOver)return;
      board[i]=current;
      cells[i].textContent=current;
      checkWinner();
      if(!gameOver){
        current=current==='X'?'O':'X';
        status.textContent="Player "+current+"'s turn";
      }
    }
    cells.forEach((cell,i)=>{
      cell.onclick=()=>handleClick(i);
    });
    document.getElementById('reset').onclick=function(){
      board=Array(9).fill('');
      current='X';
      gameOver=false;
      status.textContent="Player X's turn";
      cells.forEach(cell=>{
        cell.textContent='';
        cell.classList.remove('winner');
      });
    };
  </script>
</body>
</html>
