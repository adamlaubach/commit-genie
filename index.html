<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Demo | TechFest</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Outfit',sans-serif;background:#ffffff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
    .header-img,.footer-img{width:100%;display:block;flex-shrink:0}
    .c{background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.08);border-radius:12px;max-width:340px;width:100%;padding:28px 18px 22px 18px;box-shadow:0 0 20px rgba(208,21,71,0.15);display:flex;flex-direction:column;align-items:center}
    .t{font-size:1.5rem;font-weight:700;margin-bottom:10px;letter-spacing:-.5px}
    .b{display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px);gap:8px;margin:18px 0 12px 0}
    .cell{width:48px;height:48px;background:#f5f5f5;border:1.5px solid #f0f0f0;border-radius:8px;font-size:2rem;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:none;outline:none}
    .cell:disabled{color:#bbb;cursor:default}
    .s{font-size:1rem;font-weight:500;min-height:24px;margin-bottom:10px}
    .r{margin-top:8px;background:linear-gradient(135deg,#d01547,#f5f5f5);color:#1a1a1a;font-weight:700;border:none;border-radius:10px;padding:10px 22px;cursor:pointer;font-size:1rem}
    @media(max-width:400px){.c{padding:16px 2vw}.b{gap:4px}.cell{width:36px;height:36px;font-size:1.3rem}}
  </style>
</head>
<body>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="header-img" alt="Header" style="min-height:100px; background:#061525;" />
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
    <div class="c">
      <div class="t">Tic Tac Toe</div>
      <div id="status" class="s"></div>
      <div class="b" id="board"></div>
      <button class="r" id="restart">Restart</button>
    </div>
  </div>
  <img src="https://raw.githubusercontent.com/adamlaubach/commit-genie/main/Dev_Demo_Header.png" class="footer-img" alt="Footer" style="min-height:28px; background:#0a1f33;" />
  <script>
    const boardEl=document.getElementById('board'),statusEl=document.getElementById('status'),restartBtn=document.getElementById('restart');
    let board,turn,gameOver;
    const taunts=["Nice move!","Try harder!","Ouch!","You got this!","Block it!","Almost!","Sharp!","Tense!","Classic!","Focus!"];
    function init(){board=["","","","","","","","",""];turn="X";gameOver=false;render();setStatus("X's turn")}
    function setStatus(msg){statusEl.textContent=msg}
    function render(){boardEl.innerHTML="";for(let i=0;i<9;i++){const c=document.createElement('button');c.className="cell";c.textContent=board[i];c.disabled=!!board[i]||gameOver;c.onclick=()=>move(i);boardEl.appendChild(c)}}
    function move(i){if(board[i]||gameOver)return;board[i]=turn;render();if(checkWin(turn)){setStatus(turn+" wins! "+randTaunt());gameOver=true;return}else if(board.every(x=>x)){setStatus("Draw!");gameOver=true;return}turn=turn==="X"?"O":"X";setStatus(turn+"'s turn")}
    function checkWin(p){const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];return w.some(a=>a.every(i=>board[i]===p))}
    function randTaunt(){return taunts[Math.floor(Math.random()*taunts.length)]}
    restartBtn.onclick=init;init();
  </script>
</body>
</html>
